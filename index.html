<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Ruleta Beer Simulator PRO 🍺</title>
<style>
    body {
        margin: 0;
        background: #0a0a0a;
        color: white;
        font-family: 'Arial Black', sans-serif;
        text-align: center;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        overflow: hidden;
    }
    .container { position: relative; }
    canvas {
        display: block;
        margin: auto;
        filter: drop-shadow(0 0 30px rgba(241, 196, 15, 0.4));
    }
    button {
        padding: 15px 45px;
        font-size: 22px;
        margin-top: 20px;
        border-radius: 50px;
        border: none;
        background: linear-gradient(#f1c40f, #d35400);
        color: white;
        cursor: pointer;
        box-shadow: 0 6px #963d00;
        transition: 0.1s;
    }
    button:active { transform: translateY(4px); box-shadow: 0 1px #963d00; }
    button:disabled { background: #444; box-shadow: none; opacity: 0.7; }
    
    #result { 
        font-size: 32px; 
        margin: 15px; 
        height: 45px; 
        color: #f1c40f; 
        transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    .stats {
        background: rgba(255,255,255,0.05);
        padding: 10px 30px;
        border-radius: 30px;
        border: 1px solid rgba(241,196,15,0.3);
    }
</style>
</head>
<body>

<h1>🍺 BEER SIMULATOR PRO</h1>

<div class="container">
    <canvas id="c" width="450" height="450"></canvas>
</div>

<button id="spinBtn" onclick="spin()">¡GIRAR Y SERVIR! 🍻</button>

<div id="result"></div>

<div class="stats">
    <span style="color: #f1c40f;">🔴 CON: <span id="countAl">0</span></span> | 
    <span style="color: #3498db;">🔵 SIN: <span id="countNo">0</span></span>
</div>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

let W = canvas.width, H = canvas.height;
let cx = W/2, cy = H/2, radius = 180;
let rotation = 0, velocity = 0, isSpinning = false, tickerAngle = 0;
let countAl = 0, countNo = 0;
let victoryParticles = []; // Partículas de explosión final
const sectors = ["CON", "SIN", "CON", "SIN", "CON", "SIN", "CON", "SIN"];

// Física de la onda
let wave = [];
for(let i=0; i<60; i++) wave.push({y:0, vy:0});

// Burbujas ambientales
let bubbles = [];
for(let i=0; i<60; i++){
    bubbles.push({
        x: Math.random()*W,
        y: Math.random()*H,
        r: Math.random()*2+1,
        vy: Math.random()*-1.5 - 0.5
    });
}

function loop(){
    requestAnimationFrame(loop);
    ctx.clearRect(0,0,W,H);

    // 1. DIBUJAR RUEDA DE FONDO
    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(rotation);
    for(let i=0; i<8; i++){
        let angle = i * Math.PI/4;
        ctx.beginPath();
        ctx.moveTo(0,0);
        ctx.arc(0,0, radius, angle, angle + Math.PI/4);
        ctx.fillStyle = i % 2 == 0 ? "#f1c40f" : "#3498db";
        ctx.fill();
        ctx.strokeStyle = "rgba(0,0,0,0.1)";
        ctx.stroke();

        ctx.save();
        ctx.rotate(angle + Math.PI/8);
        ctx.textAlign = "right";
        ctx.fillStyle = "white";
        ctx.font = "bold 22px Arial";
        ctx.fillText(sectors[i], radius - 20, 8);
        ctx.restore();
    }
    ctx.restore();

    // 2. MÁSCARA CIRCULAR (Para el líquido)
    ctx.save();
    ctx.beginPath();
    ctx.arc(cx, cy, radius, 0, Math.PI*2);
    ctx.clip();

    // 3. FÍSICA Y DIBUJO DEL LÍQUIDO + ESPUMA
    let tilt = velocity * 70;
    
    // --- Capa Cerveza ---
    ctx.beginPath();
    ctx.moveTo(cx - radius, cy);
    for(let i=0; i<wave.length; i++){
        let w = wave[i];
        w.vy += (-w.y * 0.04);
        w.vy += Math.sin(i/5 + performance.now()/150) * (0.2 + velocity*4);
        w.vy += tilt * (i/wave.length - 0.5) * 0.6;
        w.vy *= 0.92;
        w.y += w.vy;
        let x = (cx - radius) + ((radius*2) * (i/wave.length));
        let y = cy + 25 + w.y - (velocity * 45);
        ctx.lineTo(x, y);
    }
    ctx.lineTo(cx + radius, H);
    ctx.lineTo(cx - radius, H);
    ctx.closePath();
    let grad = ctx.createLinearGradient(0, cy - 80, 0, cy + radius);
    grad.addColorStop(0, "#f1c40f");
    grad.addColorStop(1, "#d35400");
    ctx.fillStyle = grad;
    ctx.fill();

    // --- Capa Espuma Blanca Superior ---
    ctx.beginPath();
    ctx.moveTo(cx - radius, cy);
    for(let i=0; i<wave.length; i++){
        let x = (cx - radius) + ((radius*2) * (i/wave.length));
        let y = cy + 25 + wave[i].y - (velocity * 45);
        ctx.lineTo(x, y);
    }
    for(let i=wave.length-1; i>=0; i--){
        let x = (cx - radius) + ((radius*2) * (i/wave.length));
        let y = cy + 25 + wave[i].y - (velocity * 45) + 18; // Grosor de espuma
        ctx.lineTo(x, y);
    }
    ctx.closePath();
    ctx.fillStyle = "rgba(255, 255, 255, 0.95)";
    ctx.fill();

    // --- Burbujas Ambientales ---
    for(let b of bubbles){
        b.y += b.vy - (velocity * 12);
        if(b.y < cy - radius) {
            b.y = cy + radius;
            b.x = (cx - radius) + Math.random() * (radius*2);
        }
        ctx.beginPath();
        ctx.arc(b.x, b.y, b.r, 0, Math.PI*2);
        ctx.fillStyle = "rgba(255,255,255,0.4)";
        ctx.fill();
    }
    ctx.restore();

    // 4. AGUJA (Ticker)
    drawTicker();

    // 5. CONTROL DE GIRO (Frenada en ~3.5s)
    if(isSpinning){
        rotation += velocity;
        velocity *= 0.988; // Fricción ajustada para 3.5s
        
        let sectorCurrent = Math.floor((rotation % (Math.PI*2)) / (Math.PI/4));
        let sectorLast = Math.floor(((rotation - velocity) % (Math.PI*2)) / (Math.PI/4));
        if(sectorCurrent != sectorLast) tickerAngle = -0.6;
        tickerAngle *= 0.8;

        if(velocity < 0.002) stopWheel();
    }

    // 6. DIBUJAR PARTÍCULAS DE VICTORIA (Explosión final)
    for(let i = victoryParticles.length - 1; i >= 0; i--) {
        let p = victoryParticles[i];
        p.x += p.vx; p.y += p.vy; p.life -= 0.02;
        if(p.life <= 0) { victoryParticles.splice(i, 1); continue; }
        ctx.beginPath();
        ctx.arc(p.x, p.y, 5 * p.life, 0, Math.PI * 2);
        ctx.fillStyle = p.color;
        ctx.globalAlpha = p.life;
        ctx.fill();
        ctx.globalAlpha = 1.0;
    }
}

function drawTicker(){
    ctx.save();
    ctx.translate(cx, cy - radius - 5);
    ctx.rotate(tickerAngle);
    ctx.beginPath();
    ctx.moveTo(-18, -25); ctx.lineTo(18, -25); ctx.lineTo(0, 35);
    ctx.closePath();
    ctx.fillStyle = "white";
    ctx.shadowBlur = 10; ctx.shadowColor = "black";
    ctx.fill();
    ctx.restore();
}

function spin(){
    if(isSpinning) return;
    isSpinning = true;
    victoryParticles = []; // Limpiar partículas anteriores
    document.getElementById("spinBtn").disabled = true;
    document.getElementById("result").textContent = "Mezclando...";
    document.getElementById("result").style.transform = "scale(1)";
    velocity = 0.5 + Math.random() * 0.2; // Impulso inicial
}

function stopWheel(){
    isSpinning = false;
    velocity = 0;
    document.getElementById("spinBtn").disabled = false;

    let finalAngle = (1.5 * Math.PI - rotation) % (Math.PI * 2);
    if(finalAngle < 0) finalAngle += Math.PI * 2;
    let idx = Math.floor(finalAngle / (Math.PI / 4));
    let res = sectors[idx];

    // EFECTO: Explosión de burbujas al parar
    for(let i=0; i<40; i++) {
        victoryParticles.push({
            x: cx, y: cy - radius + 20,
            vx: (Math.random() - 0.5) * 12,
            vy: (Math.random() - 0.5) * 12,
            life: 1.0,
            color: res === "CON" ? "#f1c40f" : "#3498db"
        });
    }

    const resDiv = document.getElementById("result");
    resDiv.style.transform = "scale(1.4)";
    if(res === "CON"){
        resDiv.textContent = "🍻 ¡CON ALCOHOL! 🔴";
        resDiv.style.color = "#f1c40f";
        countAl++; document.getElementById("countAl").textContent = countAl;
    } else {
        resDiv.textContent = "💧 ¡SIN ALCOHOL! 🔵";
        resDiv.style.color = "#3498db";
        countNo++; document.getElementById("countNo").textContent = countNo;
    }
}

loop();

// Inclinación móvil
window.addEventListener("deviceorientation", e => {
    let gravityTilt = e.gamma / 40;
    if(!isSpinning) for(let w of wave) w.vy += gravityTilt;
});
</script>
</body>
</html>
