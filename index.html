<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Ruleta Beer PRO Canvas 🍺</title>

<style>
body {
    margin: 0;
    background: #0a0a0a;
    color: white;
    font-family: Arial Black;
    text-align: center;
}

canvas {
    display: block;
    margin: auto;
}

button {
    padding: 15px 40px;
    font-size: 20px;
    margin-top: 20px;
    border-radius: 50px;
    border: none;
    background: orange;
    color: white;
    cursor: pointer;
}
</style>
</head>

<body>

<h1>🍺 RULETA BEER PRO (CANVAS)</h1>

<canvas id="c" width="400" height="400"></canvas>

<button onclick="spin()">GIRAR 🍻</button>

<div id="result"></div>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

let W = canvas.width;
let H = canvas.height;
let cx = W/2;
let cy = H/2;
let radius = 150;

let rotation = 0;
let velocity = 0;

// =========================
// PARTÍCULAS (BURBUJAS)
// =========================
let bubbles = [];

for(let i=0;i<40;i++){
    bubbles.push({
        x: Math.random()*W,
        y: Math.random()*H,
        r: Math.random()*3+1,
        vy: Math.random()*-1-0.5
    });
}

// =========================
// ONDA DEL LÍQUIDO
// =========================
let wave = [];

for(let i=0;i<50;i++){
    wave.push({
        x: i*(W/50),
        y: 0,
        vy: 0
    });
}

// =========================
// LOOP PRINCIPAL
// =========================
function loop(){
    requestAnimationFrame(loop);

    ctx.clearRect(0,0,W,H);

    // FONDO RUEDA
    ctx.save();
    ctx.translate(cx,cy);
    ctx.rotate(rotation);

    for(let i=0;i<8;i++){
        ctx.beginPath();
        ctx.moveTo(0,0);
        ctx.arc(0,0,radius,i*Math.PI/4,(i+1)*Math.PI/4);
        ctx.fillStyle = i%2==0 ? "#f1c40f" : "#3498db";
        ctx.fill();
    }

    ctx.restore();

    // =====================
    // LÍQUIDO (WAVE)
    // =====================
    ctx.save();
    ctx.beginPath();
    ctx.arc(cx,cy,radius,0,Math.PI*2);
    ctx.clip();

    let tilt = velocity * 50;

    ctx.beginPath();
    ctx.moveTo(0,cy);

    for(let i=0;i<wave.length;i++){
        let w = wave[i];

        // física simple onda
        w.vy += (-w.y * 0.02);
        w.vy += Math.sin(i + performance.now()/200)*0.05;
        w.vy += tilt * (i/wave.length - 0.5)*0.01;
        w.vy *= 0.95;
        w.y += w.vy;

        ctx.lineTo(w.x, cy + w.y);
    }

    ctx.lineTo(W,H);
    ctx.lineTo(0,H);
    ctx.closePath();

    let grad = ctx.createLinearGradient(0,0,0,H);
    grad.addColorStop(0,"#fff8");
    grad.addColorStop(0.2,"#f1c40f");
    grad.addColorStop(1,"#e67e22");

    ctx.fillStyle = grad;
    ctx.fill();

    // =====================
    // BURBUJAS
    // =====================
    for(let b of bubbles){
        b.y += b.vy - velocity*2;
        if(b.y < cy - radius){
            b.y = cy + radius;
            b.x = Math.random()*W;
        }

        ctx.beginPath();
        ctx.arc(b.x,b.y,b.r,0,Math.PI*2);
        ctx.fillStyle = "rgba(255,255,255,0.6)";
        ctx.fill();
    }

    ctx.restore();

    // =====================
    // ROTACIÓN
    // =====================
    rotation += velocity;
    velocity *= 0.98;

}
loop();

// =========================
// SPIN
// =========================
function spin(){
    velocity += 0.2 + Math.random()*0.2;

    setTimeout(()=>{
        let res = Math.random() > 0.5 ? "CON 🍻" : "SIN 💧";
        document.getElementById("result").textContent = res;
    },2000);
}

// =========================
// MÓVIL (INCLINACIÓN REAL)
// =========================
window.addEventListener("deviceorientation", e=>{
    let tilt = e.gamma / 30;
    velocity += tilt * 0.01;
});
</script>

</body>
</html>
