<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ruleta Birra Líquida 🍺</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            text-align: center;
            background: radial-gradient(circle, #1a1a1a, #000000);
            color: white;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        h1 { font-size: 2.5rem; margin-bottom: 5px; color: #f39c12; text-shadow: 0 0 15px rgba(243, 156, 18, 0.5); }

        .wheel-container {
            position: relative;
            margin: 20px auto;
            width: 380px;
            height: 380px;
            padding: 10px;
            background: #333;
            border-radius: 50%;
            box-shadow: 0 0 50px rgba(0,0,0,0.5), inset 0 0 20px #000;
        }

        .arrow {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 0; height: 0; 
            border-left: 20px solid transparent;
            border-right: 20px solid transparent;
            border-top: 45px solid #ffffff;
            z-index: 100;
            filter: drop-shadow(0 4px 5px rgba(0,0,0,0.5));
        }

        #wheel-svg {
            width: 100%;
            height: 100%;
            transform: rotate(0deg);
            transition: transform 4s cubic-bezier(0.15, 0, 0.15, 1);
            border-radius: 50%;
        }

        /* Efecto de oleaje cuando gira */
        .is-spinning #wheel-svg {
            animation: liquid-wiggle 1s infinite ease-in-out;
        }

        @keyframes liquid-wiggle {
            0%, 100% { filter: url(#liquid-filter) brightness(1.1); }
            50% { filter: url(#liquid-filter) brightness(0.9) saturate(1.2); }
        }

        .sector-text {
            fill: #fff;
            font-weight: 900;
            font-size: 16px;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
            pointer-events: none;
        }

        button {
            padding: 15px 50px;
            font-size: 1.4rem;
            font-weight: bold;
            color: #fff;
            background: linear-gradient(#e67e22, #d35400);
            border: none;
            border-bottom: 4px solid #a04000;
            border-radius: 50px;
            cursor: pointer;
            margin-top: 25px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            transition: 0.2s;
        }

        button:active { transform: translateY(3px); border-bottom: 0; }
        button:disabled { background: #555; border-color: #333; cursor: not-allowed; }

        #result {
            margin-top: 20px;
            font-size: 28px;
            font-weight: bold;
            min-height: 40px;
            text-shadow: 0 0 10px rgba(255,255,255,0.2);
        }

        .stats {
            margin-top: 20px;
            background: rgba(255,255,255,0.05);
            padding: 10px 25px;
            border-radius: 30px;
            border: 1px solid rgba(255,255,255,0.1);
        }
    </style>
</head>
<body>

    <h1>🍺 RULETA BIRRA</h1>

    <div class="wheel-container" id="container">
        <div class="arrow"></div>
        <svg id="wheel-svg" viewBox="0 0 200 200">
            <defs>
                <filter id="liquid-filter">
                    <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="3" result="noise" />
                    <feDisplacementMap in="SourceGraphic" in2="noise" scale="5" />
                </filter>
                
                <linearGradient id="beer-grad-con" x1="0%" y1="0%" x2="0%" y2="100%">
                    <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" /> <stop offset="15%" style="stop-color:#f1c40f;stop-opacity:1" /> <stop offset="100%" style="stop-color:#d35400;stop-opacity:1" /> </linearGradient>

                <linearGradient id="beer-grad-sin" x1="0%" y1="0%" x2="0%" y2="100%">
                    <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" /> <stop offset="15%" style="stop-color:#3498db;stop-opacity:1" /> <stop offset="100%" style="stop-color:#2980b9;stop-opacity:1" />
                </linearGradient>
            </defs>
        </svg>
    </div>

    <button id="spinBtn" onclick="spin()">¡Girar Caña! 🍻</button>
    <div id="result"></div>

    <div class="stats">
        <span>🔴 CON: <span id="countAl">0</span></span> | 
        <span>🔵 SIN: <span id="countNo">0</span></span>
    </div>

    <script>
        const sectors = [
            { label: "CON", grad: "url(#beer-grad-con)" }, { label: "SIN", grad: "url(#beer-grad-sin)" },
            { label: "CON", grad: "url(#beer-grad-con)" }, { label: "SIN", grad: "url(#beer-grad-sin)" },
            { label: "CON", grad: "url(#beer-grad-con)" }, { label: "SIN", grad: "url(#beer-grad-sin)" },
            { label: "CON", grad: "url(#beer-grad-con)" }, { label: "SIN", grad: "url(#beer-grad-sin)" }
        ];

        const svg = document.getElementById("wheel-svg");
        const totalSectors = sectors.length;
        const anglePerSector = 360 / totalSectors;

        sectors.forEach((s, i) => {
            const angle = i * anglePerSector;
            const x1 = 100 + 100 * Math.cos(Math.PI * (angle - 90) / 180);
            const y1 = 100 + 100 * Math.sin(Math.PI * (angle - 90) / 180);
            const x2 = 100 + 100 * Math.cos(Math.PI * (angle + anglePerSector - 90) / 180);
            const y2 = 100 + 100 * Math.sin(Math.PI * (angle + anglePerSector - 90) / 180);

            const pathData = `M 100 100 L ${x1} ${y1} A 100 100 0 0 1 ${x2} ${y2} Z`;
            const g = document.createElementNS("http://www.w3.org/2000/svg", "g");
            
            const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
            path.setAttribute("d", pathData);
            path.setAttribute("fill", s.grad);
            path.setAttribute("stroke", "rgba(255,255,255,0.3)");
            path.setAttribute("stroke-width", "1");

            const text = document.createElementNS("http://www.w3.org/2000/svg", "text");
            text.setAttribute("x", "100");
            text.setAttribute("y", "45");
            text.setAttribute("class", "sector-text");
            text.setAttribute("transform", `rotate(${angle + anglePerSector/2}, 100, 100)`);
            text.setAttribute("text-anchor", "middle");
            text.textContent = s.label;

            g.appendChild(path);
            g.appendChild(text);
            svg.appendChild(g);
        });

        let currentRotation = 0;
        let isSpinning = false;
        let countAl = 0; let countNo = 0;

        function spin() {
            if (isSpinning) return;
            isSpinning = true;
            
            const spinBtn = document.getElementById("spinBtn");
            const container = document.getElementById("container");
            const wheel = document.getElementById("wheel-svg");
            
            container.classList.add("is-spinning");
            spinBtn.disabled = true;
            document.getElementById("result").textContent = "Sirviendo...";

            const extraRotation = Math.floor(Math.random() * 360) + 1440; 
            currentRotation += extraRotation;
            wheel.style.transform = `rotate(${currentRotation}deg)`;

            setTimeout(() => {
                container.classList.remove("is-spinning");
                const actualDeg = currentRotation % 360;
                const winningIndex = totalSectors - 1 - Math.floor((actualDeg % 360) / anglePerSector);
                const result = sectors[winningIndex < 0 ? 0 : winningIndex].label;

                const resDiv = document.getElementById("result");
                if (result === "CON") {
                    resDiv.textContent = "🍻 ¡CON ALCOHOL! 🔴";
                    resDiv.style.color = "#f1c40f";
                    countAl++;
                    document.getElementById("countAl").textContent = countAl;
                } else {
                    resDiv.textContent = "💧 ¡SIN ALCOHOL! 🔵";
                    resDiv.style.color = "#3498db";
                    countNo++;
                    document.getElementById("countNo").textContent = countNo;
                }

                isSpinning = false;
                spinBtn.disabled = false;
            }, 4000);
        }
    </script>
</body>
</html>
