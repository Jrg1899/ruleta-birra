<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ruleta Beer Pro 🍺</title>
    <style>
        body {
            font-family: 'Arial Black', sans-serif;
            text-align: center;
            background: #111;
            color: white;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .wheel-container {
            position: relative;
            width: 360px;
            height: 360px;
            margin: 20px;
            border: 10px solid #333;
            border-radius: 50%;
            box-shadow: 0 0 50px rgba(241, 196, 15, 0.2);
            overflow: visible;
        }

        /* Aguja */
        .arrow {
            position: absolute;
            top: -30px;
            left: 50%;
            transform: translateX(-50%);
            width: 0; height: 0; 
            border-left: 20px solid transparent;
            border-right: 20px solid transparent;
            border-top: 50px solid #fff;
            z-index: 100;
            filter: drop-shadow(0 5px 5px black);
        }

        #wheel-svg {
            width: 100%;
            height: 100%;
            transform: rotate(0deg);
            transition: transform 4s cubic-bezier(0.1, 0, 0.1, 1);
        }

        /* Animación de burbujas */
        .bubble {
            fill: rgba(255,255,255,0.4);
            animation: rise 2s infinite ease-in;
        }
        @keyframes rise {
            0% { transform: translateY(0); opacity: 0; }
            50% { opacity: 0.6; }
            100% { transform: translateY(-20px); opacity: 0; }
        }

        /* Botón */
        button {
            padding: 15px 40px;
            font-size: 1.5rem;
            background: linear-gradient(#f1c40f, #d35400);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 5px #963d00;
            margin-bottom: 20px;
        }
        button:active { transform: translateY(4px); box-shadow: 0 1px #963d00; }

        .stats {
            background: rgba(255,255,255,0.1);
            padding: 15px 30px;
            border-radius: 20px;
            font-size: 1.2rem;
            border: 2px solid #f1c40f;
        }

        #result {
            font-size: 2rem;
            margin: 15px;
            height: 40px;
            color: #f1c40f;
        }

        .sector-text { fill: white; font-weight: bold; font-size: 14px; pointer-events: none; }
    </style>
</head>
<body>

    <h1>🍺 RULETA VIRTUAL</h1>

    <div class="wheel-container">
        <div class="arrow"></div>
        <svg id="wheel-svg" viewBox="0 0 200 200">
            <defs>
                <linearGradient id="grad-con" x1="0" y1="0" x2="0" y2="1">
                    <stop offset="0%" stop-color="white"/> <stop offset="15%" stop-color="#f1c40f"/> <stop offset="100%" stop-color="#e67e22"/>
                </linearGradient>
                <linearGradient id="grad-sin" x1="0" y1="0" x2="0" y2="1">
                    <stop offset="0%" stop-color="white"/> <stop offset="15%" stop-color="#3498db"/> <stop offset="100%" stop-color="#2980b9"/>
                </linearGradient>
            </defs>
            <g id="sectors-group"></g>
        </svg>
    </div>

    <button id="spinBtn" onclick="spin()">¡GIRAR BIRRA! 🍻</button>
    
    <div id="result"></div>

    <div class="stats">
        <span style="color: #f1c40f;">🔴 CON: <span id="countAl">0</span></span> | 
        <span style="color: #3498db;">🔵 SIN: <span id="countNo">0</span></span>
    </div>

    <script>
        const sectors = [
            { label: "CON", type: "con" }, { label: "SIN", type: "sin" },
            { label: "CON", type: "con" }, { label: "SIN", type: "sin" },
            { label: "CON", type: "con" }, { label: "SIN", type: "sin" },
            { label: "CON", type: "con" }, { label: "SIN", type: "sin" }
        ];

        const group = document.getElementById("sectors-group");
        const anglePer = 360 / sectors.length;

        sectors.forEach((s, i) => {
            const angle = i * anglePer;
            const x1 = 100 + 100 * Math.cos(Math.PI * (angle - 90) / 180);
            const y1 = 100 + 100 * Math.sin(Math.PI * (angle - 90) / 180);
            const x2 = 100 + 100 * Math.cos(Math.PI * (angle + anglePer - 90) / 180);
            const y2 = 100 + 100 * Math.sin(Math.PI * (angle + anglePer - 90) / 180);

            const g = document.createElementNS("http://www.w3.org/2000/svg", "g");
            const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
            path.setAttribute("d", `M 100 100 L ${x1} ${y1} A 100 100 0 0 1 ${x2} ${y2} Z`);
            path.setAttribute("fill", s.type === "con" ? "url(#grad-con)" : "url(#grad-sin)");
            path.setAttribute("stroke", "rgba(0,0,0,0.1)");

            // Añadir burbujas
            for(let j=0; j<2; j++) {
                const c = document.createElementNS("http://www.w3.org/2000/svg", "circle");
                c.setAttribute("cx", 100 + (Math.random()*60 + 20) * Math.cos(Math.PI * (angle + 15 - 90) / 180));
                c.setAttribute("cy", 100 + (Math.random()*60 + 20) * Math.sin(Math.PI * (angle + 15 - 90) / 180));
                c.setAttribute("r", Math.random() * 2 + 1);
                c.setAttribute("class", "bubble");
                c.style.animationDelay = Math.random() * 2 + "s";
                g.appendChild(c);
            }

            const text = document.createElementNS("http://www.w3.org/2000/svg", "text");
            text.setAttribute("transform", `rotate(${angle + anglePer/2}, 100, 100)`);
            text.setAttribute("x", "100"); text.setAttribute("y", "45");
            text.setAttribute("text-anchor", "middle");
            text.setAttribute("class", "sector-text");
            text.textContent = s.label;

            g.appendChild(path);
            g.appendChild(text);
            group.appendChild(g);
        });

        let rotation = 0;
        let cAl = 0; let cNo = 0;

        function spin() {
            const btn = document.getElementById("spinBtn");
            btn.disabled = true;
            const extra = Math.floor(Math.random() * 360) + 1800;
            rotation += extra;
            document.getElementById("wheel-svg").style.transform = `rotate(${rotation}deg)`;

            setTimeout(() => {
                const deg = rotation % 360;
                const idx = sectors.length - 1 - Math.floor((deg % 360) / anglePer);
                const res = sectors[idx < 0 ? 0 : idx].label;

                const rDiv = document.getElementById("result");
                if(res === "CON") {
                    rDiv.textContent = "🍻 ¡CON ALCOHOL!";
                    rDiv.style.color = "#f1c40f";
                    cAl++; document.getElementById("countAl").textContent = cAl;
                } else {
                    rDiv.textContent = "💧 ¡SIN ALCOHOL!";
                    rDiv.style.color = "#3498db";
                    cNo++; document.getElementById("countNo").textContent = cNo;
                }
                btn.disabled = false;
            }, 4000);
        }
    </script>
</body>
</html>
