<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ruleta Birra Pro 🍺</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            text-align: center;
            background: radial-gradient(circle, #2c3e50, #000000);
            color: white;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        h1 { font-size: 2.5rem; margin-bottom: 5px; text-shadow: 0 0 10px rgba(255,0,0,0.5); }

        .wheel-container {
            position: relative;
            margin: 20px auto;
            width: 350px;
            height: 350px;
        }

        /* Aguja mejorada */
        .arrow {
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 0; height: 0; 
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-top: 40px solid #ffffff;
            z-index: 100;
            filter: drop-shadow(0 0 5px black);
            transform-origin: top center;
        }

        .arrow.clic { animation: arrow-clic 0.1s ease-out; }
        @keyframes arrow-clic {
            0% { transform: translateX(-50%) rotate(0deg); }
            50% { transform: translateX(-50%) rotate(20deg); }
            100% { transform: translateX(-50%) rotate(0deg); }
        }

        #wheel-svg {
            width: 100%;
            height: 100%;
            transform: rotate(0deg);
            transition: transform 4s cubic-bezier(0.1, 0, 0.1, 1);
            border-radius: 50%;
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
        }

        .sector-text {
            fill: white;
            font-weight: bold;
            font-size: 14px;
            text-transform: uppercase;
            pointer-events: none;
        }

        button {
            padding: 15px 40px;
            font-size: 1.2rem;
            font-weight: bold;
            color: white;
            background: #c0392b;
            border: 4px solid #ffffff;
            border-radius: 50px;
            cursor: pointer;
            margin-top: 20px;
            transition: 0.3s;
        }

        button:hover:not(:disabled) { background: #e74c3c; transform: scale(1.05); }
        button:disabled { background: #7f8c8d; opacity: 0.5; }

        #result {
            margin-top: 20px;
            font-size: 28px;
            font-weight: bold;
            height: 40px;
        }

        .stats {
            margin-top: 20px;
            background: rgba(255,255,255,0.1);
            padding: 15px;
            border-radius: 10px;
        }
    </style>
</head>
<body>

    <h1>🍺 RULETA BIRRA</h1>

    <div class="wheel-container">
        <div id="arrow" class="arrow"></div>
        <svg id="wheel-svg" viewBox="0 0 200 200">
            </svg>
    </div>

    <button id="spinBtn" onclick="spin()">¡Girar!</button>
    <div id="result"></div>

    <div class="stats">
        <span>🔴 CON: <span id="countAl">0</span></span> | 
        <span>🔵 SIN: <span id="countNo">0</span></span>
    </div>

    <script>
        const sectors = [
            { label: "CON", color: "#e74c3c" }, { label: "SIN", color: "#3498db" },
            { label: "CON", color: "#c0392b" }, { label: "SIN", color: "#2980b9" },
            { label: "CON", color: "#e74c3c" }, { label: "SIN", color: "#3498db" },
            { label: "CON", color: "#c0392b" }, { label: "SIN", color: "#2980b9" }
        ];

        const svg = document.getElementById("wheel-svg");
        const totalSectors = sectors.length;
        const anglePerSector = 360 / totalSectors;

        // Crear las porciones de la ruleta
        sectors.forEach((s, i) => {
            const angle = i * anglePerSector;
            const x1 = 100 + 100 * Math.cos(Math.PI * (angle - 90) / 180);
            const y1 = 100 + 100 * Math.sin(Math.PI * (angle - 90) / 180);
            const x2 = 100 + 100 * Math.cos(Math.PI * (angle + anglePerSector - 90) / 180);
            const y2 = 100 + 100 * Math.sin(Math.PI * (angle + anglePerSector - 90) / 180);

            const pathData = `M 100 100 L ${x1} ${y1} A 100 100 0 0 1 ${x2} ${y2} Z`;
            
            const g = document.createElementNS("http://www.w3.org/2000/svg", "g");
            
            const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
            path.setAttribute("d", pathData);
            path.setAttribute("fill", s.color);
            path.setAttribute("stroke", "white");
            path.setAttribute("stroke-width", "0.5");

            const text = document.createElementNS("http://www.w3.org/2000/svg", "text");
            text.setAttribute("x", "100");
            text.setAttribute("y", "40");
            text.setAttribute("class", "sector-text");
            text.setAttribute("transform", `rotate(${angle + anglePerSector/2}, 100, 100)`);
            text.setAttribute("text-anchor", "middle");
            text.textContent = s.label;

            g.appendChild(path);
            g.appendChild(text);
            svg.appendChild(g);
        });

        let currentRotation = 0;
        let isSpinning = false;
        let countAl = 0; let countNo = 0;

        function spin() {
            if (isSpinning) return;
            isSpinning = true;
            
            const spinBtn = document.getElementById("spinBtn");
            const arrow = document.getElementById("arrow");
            const wheel = document.getElementById("wheel-svg");
            
            spinBtn.disabled = true;
            document.getElementById("result").textContent = "¡Suerte!";

            const extraRotation = Math.floor(Math.random() * 360) + 2880; // 8 vueltas + random
            currentRotation += extraRotation;
            wheel.style.transform = `rotate(${currentRotation}deg)`;

            // Efecto de sonido visual (clic de la aguja)
            let clicks = 0;
            const clickInt = setInterval(() => {
                arrow.classList.remove("clic");
                void arrow.offsetWidth;
                arrow.classList.add("clic");
                clicks++;
                if (clicks >= 30) clearInterval(clickInt);
            }, 100);

            setTimeout(() => {
                clearInterval(clickInt);
                // Calcular resultado basado en el ángulo final
                const actualDeg = currentRotation % 360;
                // Ajustamos porque la aguja está arriba (270 deg en círculo trigonométrico)
                const winningIndex = totalSectors - 1 - Math.floor(((actualDeg) % 360) / anglePerSector);
                const result = sectors[winningIndex < 0 ? 0 : winningIndex].label;

                const resDiv = document.getElementById("result");
                if (result === "CON") {
                    resDiv.textContent = "🍺 ¡CON ALCOHOL! 🔴";
                    resDiv.style.color = "#ff4d4d";
                    countAl++;
                    document.getElementById("countAl").textContent = countAl;
                } else {
                    resDiv.textContent = "🟢 ¡SIN ALCOHOL! 🔵";
                    resDiv.style.color = "#3498db";
                    countNo++;
                    document.getElementById("countNo").textContent = countNo;
                }

                isSpinning = false;
                spinBtn.disabled = false;
            }, 4000);
        }
    </script>
</body>
</html>
