<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Ruleta Beer PRO Canvas 🍺</title>

<style>
    body {
        margin: 0;
        background: #0a0a0a;
        color: white;
        font-family: 'Arial Black', sans-serif;
        text-align: center;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
    }

    .container { position: relative; }

    canvas {
        display: block;
        margin: auto;
        filter: drop-shadow(0 0 20px rgba(241, 196, 15, 0.2));
    }

    button {
        padding: 15px 45px;
        font-size: 22px;
        margin-top: 20px;
        border-radius: 50px;
        border: none;
        background: linear-gradient(#f1c40f, #d35400);
        color: white;
        cursor: pointer;
        box-shadow: 0 5px #963d00;
        transition: 0.1s;
    }

    button:active { transform: translateY(4px); box-shadow: 0 1px #963d00; }
    button:disabled { background: #444; box-shadow: none; opacity: 0.7; }

    #result {
        font-size: 32px;
        margin: 20px;
        height: 40px;
        color: #f1c40f;
    }

    .stats {
        background: rgba(255,255,255,0.05);
        padding: 10px 30px;
        border-radius: 30px;
        border: 1px solid rgba(241,196,15,0.3);
        margin-top: 10px;
    }
</style>
</head>

<body>

<h1>🍺 RULETA BEER PRO</h1>

<div class="container">
    <canvas id="c" width="450" height="450"></canvas>
</div>

<button id="spinBtn" onclick="spin()">GIRAR 🍻</button>

<div id="result"></div>

<div class="stats">
    <span style="color: #f1c40f;">🔴 CON: <span id="countAl">0</span></span> | 
    <span style="color: #3498db;">🔵 SIN: <span id="countNo">0</span></span>
</div>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

let W = canvas.width;
let H = canvas.height;
let cx = W/2;
let cy = H/2;
let radius = 170;

let rotation = 0;
let velocity = 0;
let isSpinning = false;
let tickerAngle = 0; // Para la animación de la aguja

// Estadísticas
let countAl = 0;
let countNo = 0;

const sectors = ["CON", "SIN", "CON", "SIN", "CON", "SIN", "CON", "SIN"];

// =========================
// PARTÍCULAS (BURBUJAS)
// =========================
let bubbles = [];
for(let i=0; i<40; i++){
    bubbles.push({
        x: Math.random() * W,
        y: Math.random() * H,
        r: Math.random() * 2 + 1,
        vy: Math.random() * -1 - 0.5
    });
}

// =========================
// ONDA DEL LÍQUIDO
// =========================
let wave = [];
for(let i=0; i<50; i++){
    wave.push({ x: i * (W/50), y: 0, vy: 0 });
}

// =========================
// LOOP PRINCIPAL
// =========================
function loop(){
    requestAnimationFrame(loop);
    ctx.clearRect(0,0,W,H);

    // 1. DIBUJAR RUEDA Y TEXTOS
    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(rotation);

    for(let i=0; i<8; i++){
        let angle = i * Math.PI/4;
        
        // Porción
        ctx.beginPath();
        ctx.moveTo(0,0);
        ctx.arc(0,0, radius, angle, angle + Math.PI/4);
        ctx.fillStyle = i % 2 == 0 ? "#f1c40f" : "#3498db";
        ctx.strokeStyle = "rgba(255,255,255,0.2)";
        ctx.lineWidth = 2;
        ctx.fill();
        ctx.stroke();

        // Texto
        ctx.save();
        ctx.rotate(angle + Math.PI/8);
        ctx.textAlign = "right";
        ctx.fillStyle = "white";
        ctx.font = "bold 20px Arial";
        ctx.fillText(sectors[i], radius - 20, 10);
        ctx.restore();
    }
    ctx.restore();

    // 2. LÍQUIDO (WAVE)
    ctx.save();
    ctx.beginPath();
    ctx.arc(cx, cy, radius, 0, Math.PI*2);
    ctx.clip();

    let tilt = velocity * 40;
    ctx.beginPath();
    ctx.moveTo(0, cy);

    for(let i=0; i<wave.length; i++){
        let w = wave[i];
        w.vy += (-w.y * 0.03);
        w.vy += Math.sin(i + performance.now()/200) * 0.1;
        w.vy += tilt * (i/wave.length - 0.5) * 0.2;
        w.vy *= 0.92;
        w.y += w.vy;
        ctx.lineTo(w.x, cy + 30 + w.y); // Líquido un poco más abajo del centro
    }

    ctx.lineTo(W, H);
    ctx.lineTo(0, H);
    ctx.closePath();

    let grad = ctx.createLinearGradient(0, cy - 50, 0, H);
    grad.addColorStop(0, "#ffffffaa"); // Espuma
    grad.addColorStop(0.1, "#f1c40f");
    grad.addColorStop(1, "#d35400");
    ctx.fillStyle = grad;
    ctx.fill();

    // 3. BURBUJAS
    for(let b of bubbles){
        b.y += b.vy - velocity * 5;
        if(b.y < 0) b.y = H;
        
        ctx.beginPath();
        ctx.arc(b.x, b.y, b.r, 0, Math.PI*2);
        ctx.fillStyle = "rgba(255,255,255,0.4)";
        ctx.fill();
    }
    ctx.restore();

    // 4. AGUJA (TICKER)
    drawTicker();

    // 5. FÍSICA DE ROTACIÓN
    if(isSpinning){
        rotation += velocity;
        velocity *= 0.992; // Fricción suave

        // Animación aguja al chocar sectores
        let currentSector = Math.floor((rotation % (Math.PI*2)) / (Math.PI/4));
        if(currentSector != Math.floor(((rotation-velocity) % (Math.PI*2)) / (Math.PI/4))){
            tickerAngle = -0.5; // Rebote aguja
        }
        tickerAngle *= 0.8;

        if(velocity < 0.002){
            stopWheel();
        }
    }
}

function drawTicker(){
    ctx.save();
    ctx.translate(cx, cy - radius - 10);
    ctx.rotate(tickerAngle);
    
    ctx.beginPath();
    ctx.moveTo(-15, -20);
    ctx.lineTo(15, -20);
    ctx.lineTo(0, 30);
    ctx.closePath();
    
    ctx.fillStyle = "white";
    ctx.shadowBlur = 10;
    ctx.shadowColor = "black";
    ctx.fill();
    ctx.restore();
}

function spin(){
    if(isSpinning) return;
    
    isSpinning = true;
    document.getElementById("spinBtn").disabled = true;
    document.getElementById("result").textContent = "Sirviendo...";
    velocity = 0.3 + Math.random() * 0.3;
}

function stopWheel(){
    isSpinning = false;
    velocity = 0;
    document.getElementById("spinBtn").disabled = false;

    // Calcular resultado real según ángulo
    // La aguja está arriba (3/2 PI), restamos rotación para ver qué sector quedó ahí
    let finalAngle = (1.5 * Math.PI - rotation) % (Math.PI * 2);
    if(finalAngle < 0) finalAngle += Math.PI * 2;
    
    let sectorIndex = Math.floor(finalAngle / (Math.PI / 4));
    let res = sectors[sectorIndex];

    const resDiv = document.getElementById("result");
    if(res === "CON"){
        resDiv.textContent = "🍻 ¡CON ALCOHOL!";
        resDiv.style.color = "#f1c40f";
        countAl++;
        document.getElementById("countAl").textContent = countAl;
    } else {
        resDiv.textContent = "💧 ¡SIN ALCOHOL!";
        resDiv.style.color = "#3498db";
        countNo++;
        document.getElementById("countNo").textContent = countNo;
    }
}

loop();

// Soporte inclinación móvil
window.addEventListener("deviceorientation", e => {
    if(!isSpinning){
        let tilt = e.gamma / 50; 
        for(let w of wave) w.vy += tilt;
    }
});
</script>

</body>
</html>
